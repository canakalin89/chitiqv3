events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # The duplicate MIME type warning usually comes from having 
    # 'text/html' defined in both mime.types and a custom types block.
    # We'll rely on the include above.

    server {
        listen 3001;
        server_name localhost;

        # Root directory for static files
        # In a multi-container setup, Nginx might have access to the app's dist folder
        # via a shared volume. If not, it proxies everything.
        root /usr/share/nginx/html;
        index index.html;

        location / {
            # First attempt to serve request as file, then
            # as directory, then fall back to proxying to the app container.
            try_files $uri $uri/ @app;
        }

        location @app {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support (if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Explicitly handle static assets to avoid 404s if they are in the Nginx container
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
            # Try to serve from Nginx's root first
            try_files $uri @app;
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
